version: '3.8'

services:
  db:
    container_name: testdb
    image: postgres:14.3
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: MySret3tPassWord@as2
      POSTGRES_DB: TesloDB
    volumes:
      - ./postgres:/var/lib/postgresql/data
    networks:
      - internal_net

  api:
    container_name: api
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: MySret3tPassWord@as2
      DB_NAME: TesloDB
      PORT: 3000
      HOST_API: http://localhost:3000/api
    networks:
      - internal_net

  n8n:
    container_name: n8n
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - ./n8n_data:/home/node/.n8n
    networks:
      - internal_net

networks:
  internal_net:
    driver: bridge